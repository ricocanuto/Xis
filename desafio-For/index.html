<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurar Contato</title>
</head>

<body>
    <input placeholder="Digite o nome do contato">
    <p></p>
    <button onclick="search()">Procurar Contato</button>
</body>

<script>

    let p = document.querySelector('p')
    let input = document.querySelector('input')

    const contacts = [
        { name: 'Rodolfo', age: 33, number: '(19)98883456' },
        { name: 'Maria', age: 34, number: '(19)98887654' },
        { name: 'Renata', age: 28, number: '(19)98886743' },
        { name: 'Beatriz', age: 29, number: '(19)98882156' },
    ]
    function search() {
        let found = false;
        let i = 0;

    do {
        const contact = contacts[i];

        if (input.value.toLowerCase() === contact.name.toLowerCase()) {
            p.innerHTML = "Contato encontrado Nome:" + contact.name +
                " Tel:" + contact.number;
            found = true;
            break;
        }

        i++;
    } while (i < contacts.length);

    if (!found) {
        p.innerHTML = "Contato não encontrado, tente novamente";

        
    }

    }
    

</script>

</html>
